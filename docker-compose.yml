# Dev: `docker compose up -d` starts ONLY postgres (api/webapp are behind the
# "app" profile — dev runs those via `./cm ui`). Prod: COMPOSE_PROFILES=app
# (or `docker compose --profile app up -d --build`) runs the full stack; the
# pipeline is cron-driven via `docker compose exec -T api ./cm ...`
# (see deploy/crontab.prod + deploy/README-prod.md).
#
# Schema is owned by the one-shot `migrate` service: it runs `./cm migrate` to
# completion and exits, and `api` won't start until it succeeds
# (service_completed_successfully). Re-runs on every `up` are safe — the runner
# skips already-applied versions and aborts on a dirty (half-applied) one.
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: nubra-community-postgres
    environment:
      POSTGRES_USER: community
      POSTGRES_PASSWORD: community
      POSTGRES_DB: nubra_community
    ports:
      - "5544:5432"
    volumes:
      - nubra_community_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U community -d nubra_community"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot schema owner: applies pending migrations then exits 0. Shares the
  # api image (same ./cm + migrations/), so no separate build/pull. api gates on
  # this completing successfully; a DIRTY/failed migration exits non-zero and
  # keeps api from starting against a bad schema.
  migrate:
    image: ${ECR_REGISTRY:-851725268918.dkr.ecr.ap-south-1.amazonaws.com}/zs/nubra-ai:nubra-beacon-api-${RELEASE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.api
    profiles: ["app"]
    env_file: .env
    environment:
      # container-internal DB host, independent of the .env flavor (dev/prod)
      DB_URL: postgresql://community:community@postgres:5432/nubra_community
      TZ: Asia/Kolkata
    command: ["./cm", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"   # one-shot job, not a long-running server

  api:
    # RELEASE_TAG comes from .env (compose substitution) — `make pull-prod`
    # pulls this tag from ECR; `up --build` still builds locally as fallback.
    image: ${ECR_REGISTRY:-851725268918.dkr.ecr.ap-south-1.amazonaws.com}/zs/nubra-ai:nubra-beacon-api-${RELEASE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.api
    profiles: ["app"]
    env_file: .env
    environment:
      # inside the compose network the DB lives at the service name, not localhost
      DB_URL: postgresql://community:community@postgres:5432/nubra_community
      MODE: prod
      TZ: Asia/Kolkata
    ports:
      - "8400:8400"
    volumes:
      - ./out:/app/out          # cron logs + message archives visible on the host
      - hf_cache:/hf-cache      # embedding model cache survives restarts
      # registry is CONFIG, not code: bind-mount so prod edits (thresholds,
      # dashboard_url, weight re-tunes) apply on the next run without an
      # image release. Read-only — the pipeline never writes it.
      - ./community/config/registry.yaml:/app/community/config/registry.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8400/api/v1/health', timeout=4).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  webapp:
    image: ${ECR_REGISTRY:-851725268918.dkr.ecr.ap-south-1.amazonaws.com}/zs/nubra-ai:nubra-beacon-webapp-${RELEASE_TAG:-latest}
    build:
      context: ./webapp
      args:
        NEXT_PUBLIC_API_BASE: http://api:8400/api/v1   # browser-proxy rewrite target (build-time)
    profiles: ["app"]
    environment:
      API_BASE: http://api:8400/api/v1                 # server-side fetches (runtime)
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e",
             "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  nubra_community_pgdata:
  hf_cache:
