    status: live
    category: trading
    surfaces: [Mobile app, Web trading platform]
    personas: [Option Buyer, Option Seller, OI Trader, Scalper]
    description: Trade futures and options on NSE and BSE through Nubra trading flows.
    seo_keywords: [fno, f&o, futures, options, banknifty, nifty options, expiry, expiry day trading]

  - name: API and algo trading access
    status: live
    category: api
    surfaces: [API, SDK]
    personas: [API / Algo User]
    description: REST/websocket APIs for market data, order placement and automated trading workflows.
    seo_keywords: [algo trading, trading api, api trading, websocket market data, automated trading, order placement api]

  - name: Nubra UAT
    status: live
    category: testing
    surfaces: [API, Web trading platform]
    personas: [API / Algo User, Strategy Trader]
    description: UAT/paper-trading style environment for testing flows before production usage.
    seo_keywords: [paper trading, uat trading, test trading api, sandbox trading, forward testing]

  - name: OMS V3
    status: live
    category: execution
    surfaces: [API, Web trading platform, Mobile app]
