design_review_rules:
  trading_risk:
    - Show risk before order placement.
    - Make margin, charges, payoff, SL/TP and P&L implication visible where relevant.
    - Separate analysis-only views from executable trading actions.
    - Confirm destructive or irreversible actions.
    - Explain disabled states and unavailable actions.
  persona_consistency:
    - Investor mode should not overload users with advanced derivatives controls by default.
    - Option buyer mode should surface premium risk, payoff, expiry and directional clarity.
    - Option seller mode should surface margin, payoff, strategy risk and adjustment controls.
    - OI trader mode should surface OI, volume, IV, PCR, max pain and concentration clearly.
    - Scalper mode should prioritize speed but preserve safety and confirmation where needed.
  ui_consistency:
    - Keep CTA hierarchy consistent across consecutive screens.
    - Keep terminology consistent with this context file.
    - Show empty, loading, error, success and confirmation states for important flows.
    - Keep order modification flows clear when changing order type or quantity.

