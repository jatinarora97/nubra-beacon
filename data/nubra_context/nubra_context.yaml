version: nubra-context-v1
updated_at: "2026-07-14"
owner_note: >
  This is the editable Nubra product context used by Beacon for grounding,
  feature matching, social recommendations and future design review workflows.
  Update this file when Nubra adds, removes or changes live/upcoming features.

brand:
  name: Nubra
  category: Indian stock broker and trading platform
  positioning: >
    Nubra is a trading platform focused on retail traders, F&O traders,
    strategy users, active market participants and API/algo users.
  product_surfaces:
    - Mobile app
    - Web trading platform
    - API
    - SDK
    - MCP
    - UAT / paper-trading environment
  audience_segments:
    - Retail investor
    - Active equity trader
    - Option buyer
    - Option seller
    - OI trader
    - Scalper
    - Strategy trader
    - API / algo trader
    - Developer building trading tools

claim_guardrails:
  allowed:
    - Use only active context features for direct Nubra product claims.
    - Phrase upcoming features as upcoming, planned or in-progress unless officially launched.
    - Use community data to recommend opportunities, but do not claim Nubra has a capability unless it appears in this context.
    - Keep competitor comparisons factual and avoid unsupported superiority claims.
  avoid:
    - Guaranteed profit claims.
    - Assured returns or loss recovery language.
    - Dated launch promises unless a date is officially approved.
    - Claims that Nubra is the only broker with a feature unless legally/market verified.
    - Investment advice, stock tips or trading recommendations.

feature_metadata_defaults:
  source_of_truth: product_context_file
  status_confidence: medium
  public_visibility: internal_review_required
  launch_stage: not_specified
  priority: medium
  direct_claim_rule: >
    Live features can be used for direct product claims only if the description
    is product-approved. Upcoming features should be framed as planned,
    upcoming or under review unless a public launch has happened.

feature_metadata_fields:
  priority:
    allowed_values: [high, medium, low]
    purpose: Helps social recommendations and roadmap analysis rank feature importance.
  public_visibility:
    allowed_values: [public_claim_allowed, internal_review_required, internal_only]
    purpose: Controls whether AI can use the feature in public-facing content.
  launch_stage:
    allowed_values: [live, beta, upcoming, design, discovery, not_specified]
    purpose: Separates launched capability, beta, planned feature and early idea.
  status_confidence:
    allowed_values: [high, medium, low]
    purpose: Indicates how confident Beacon should be when grounding claims.
  source_of_truth:
    allowed_values: [product_context_file, product_team, marketing_team, design_file, api_docs, internal_note]
    purpose: Captures where the feature information came from.

