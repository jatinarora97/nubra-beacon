version: nubra-context-v1
updated_at: "2026-07-14"
owner_note: >
  This is the editable Nubra product context used by Beacon for grounding,
  feature matching, social recommendations and future design review workflows.
  Update this file when Nubra adds, removes or changes live/upcoming features.

brand:
  name: Nubra
  category: Indian stock broker and trading platform
  positioning: >
    Nubra is a trading platform focused on retail traders, F&O traders,
    strategy users, active market participants and API/algo users.
  product_surfaces:
    - Mobile app
    - Web trading platform
    - API
    - SDK
    - MCP
    - UAT / paper-trading environment
  audience_segments:
    - Retail investor
    - Active equity trader
    - Option buyer
    - Option seller
    - OI trader
    - Scalper
    - Strategy trader
    - API / algo trader
    - Developer building trading tools

claim_guardrails:
  allowed:
    - Use only active context features for direct Nubra product claims.
    - Phrase upcoming features as upcoming, planned or in-progress unless officially launched.
    - Use community data to recommend opportunities, but do not claim Nubra has a capability unless it appears in this context.
    - Keep competitor comparisons factual and avoid unsupported superiority claims.
  avoid:
    - Guaranteed profit claims.
    - Assured returns or loss recovery language.
    - Dated launch promises unless a date is officially approved.
    - Claims that Nubra is the only broker with a feature unless legally/market verified.
    - Investment advice, stock tips or trading recommendations.

personas:
  - name: Investor
    description: Long-term user focused on portfolio, fundamentals, holdings and market context.
    useful_features:
      - Watchlist 250 instruments
      - FII/DII and institutional flow context
      - Fundamentals and market news
      - Portfolio analytics
  - name: Option Buyer
    description: Directional derivatives user who needs quick strike selection, premium risk and payoff clarity.
    useful_features:
      - Option buyer mode
      - Call view and put view
      - Payoff and analysis on the face
      - Risk-reward SL/TP
      - Technical alerts
      - Option chain filters
  - name: Option Seller
    description: Derivatives user focused on premium selling, margin, payoff, risk and strategy monitoring.
    useful_features:
      - Option seller mode
      - Strategy-level portfolios
      - Strategy-level SL/TP
      - P&L based SL/TP
      - Margin/amount based quantity selection
      - 40+ pre-built strategies
  - name: OI Trader
    description: User who trades using open interest, volume, IV, PCR, max pain and option-chain structure.
    useful_features:
      - OI trader mode
      - OI bars
      - PCR
      - Total OI
      - Max pain
      - OI buildup
      - OI concentration
      - Option chain based alerts
  - name: Scalper
    description: Very active intraday user who needs fast order placement, quick modification and execution clarity.
    useful_features:
      - Scalper mode
      - One-click mode
      - Best fill price in NSE
      - Bid-ask on option chain
      - Bid-ask on chart
      - Flexible order modification
  - name: API / Algo User
    description: Developer or trader using APIs, SDK, websocket data, automated execution and testing environments.
    useful_features:
      - API and algo trading access
      - Reliable websocket
      - Static IP support
      - TOTP support
      - Primary and secondary IP support
      - Multi-session support
      - Nubra UAT
      - OMS V3

