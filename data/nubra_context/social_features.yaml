features:
  - id: fno_trading
    name: F&O trading on NSE and BSE
    status: live
    segment: retail
    category: trading
    surfaces: [mobile, web]
    personas: [Option Buyer, Option Seller, OI Trader, Scalper, Strategy Trader]
    description: Trade futures and options on NSE and BSE through Nubra's retail trading surfaces.
    keywords: [F&O, futures, options, NSE F&O, BSE F&O, Nifty options, BankNifty options]

  - id: flexible_brokerage
    name: Flexible brokerage
    status: live
    segment: retail
    category: pricing
    surfaces: [mobile, web]
    personas: [Option Buyer, Option Seller, Scalper, Strategy Trader]
    description: >
      Users can choose between Per Lot and Per Order plans. Under Per Lot,
      options brokerage is ₹2 per ₹1,000 premium capped at ₹5 per lot, futures
      are ₹10 per lot, commodity options are ₹2 per ₹1,000 premium capped at
      ₹5 per lot, and commodity futures are ₹10 per lot. Under Per Order,
      options and futures are ₹20 per order while commodity options are ₹5 per
      order and commodity futures are ₹20 per order. Equity delivery is ₹0 on
      both plans; equity intraday is 0.03% of turnover on Per Lot and ₹20 on
      Per Order. The choice is especially relevant to F&O traders whose costs
      vary with order size, number of lots, and trading frequency.
    keywords: [flexible brokerage, per lot brokerage, per order brokerage, options brokerage, F&O charges]

  - id: brokerage_account_charges
    name: Transparent account and transaction charges
    status: live
    segment: retail
    category: pricing
    surfaces: [web]
    personas: [Investor, Option Buyer, Option Seller, Scalper, Strategy Trader]
    description: >
      The brokerage screen presents statutory and regulatory charges alongside
      plan pricing. Individual account opening is ₹0 and non-individual account
      opening is ₹500 plus 18% GST. Individual AMC is ₹300 plus 18% GST and
      non-individual AMC is ₹1,000 plus 18% GST, with AMC not applicable for
      the first year. DP charges are ₹12.50 plus GST, pledge/unpledge is ₹15
      plus GST per transaction per scrip/ISIN, Call & Trade is ₹20 plus GST per
      executed order, and auto square-off is ₹20 plus GST per executed order.
      Statutory, exchange, tax, interest, and penalty charges should always be
      shown as subject to the current published schedule.
    keywords: [brokerage charges, AMC charges, DP charges, pledge charges, call and trade, auto square off]

