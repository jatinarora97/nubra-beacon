# Source registry (LLD-02 §1.3) — local build values.
# All crons in IST on prod; locally stages run via `runner.py run-local`.
sources:
  twitter:
    enabled: true
    live_fetch: true
    x_live_cap: 300             # backstop, not a throttle: $29/mo twitterapi plan = ~3.13M
                                # credits (~2,088 tweets/day at 15 cr/tweet). 300/run caps a
                                # runaway query at $0.045; normal runs collect far less.
                                # (was 10 during the free-trial era; raised 2026-07-09)
    csv_backfill: data/twitter_pulse.csv
    queries:
      - "(zerodha OR groww OR upstox OR dhan OR \"angel one\" OR nubra) lang:en"
    keywords:                   # kind=keyword seeds; config {x, reddit} per keyword
      - value: nubra            # brand watch — powers Nubra mentions + Broker issues (2026-07-07)
        x: true
        reddit: true
    # hashtag/handle seeds (researched 2026-07-05; were DB-only until the prod
    # fresh-start showed seeds must live here — 2026-07-09). category: value
    hashtags:
      market_trading: [Nifty, Nifty50, Sensex, ShareMarket, StockMarketIndia, IPO]
      fno_algo: [BankNifty, FinNifty, FnO, IntradayTrading, OptionsTrading, AlgoTrading]
      investing_pf: [MutualFunds, SIP]
    handles:
      official: [NSEIndia, BSEIndia, SEBI_India]
      brokers: [zerodhaonline, Nithin0dha]
      finfluencers: [deepakshenoy, dmuthuk, kyalashish, MashraniVivek, Mitesh_Engr, safalniveshak]
      fno_algo: [marketcallsHQ]
    budget:
      max_items_per_run: 1500
      max_usd_per_day: 1.00     # ~= the $29 plan's daily allowance; raise if X volume earns it
  reddit:
    enabled: true
    subreddits:                 # category -> subs (category stored on items as raw.category)
      brokers:                  # brand visibility + competitor issues (all live-probed 2026-07-05)
        - Zerodha
        - groww
        - upstox
        - dhanhq
      market_trading:           # trends: NSE/BSE, stocks, market moves
        - IndianStreetBets
        - IndianStockMarket
        - StockMarketIndia
        - DalalStreetTalks
        - DalalStreetBets
        - NSEbets
      investing_pf:             # investing + personal finance (feature requests, charges chatter)
        - IndiaInvestments
        - mutualfunds
        - personalfinanceindia
        - FIREIndia
        - IndiaFinance
        - IndiaTax
      fno_algo:                 # F&O traders + algo/API crowd
        - IndiaOptionsSelling
        - IndiaAlgoTrading
    max_posts_per_sub: 10
    comments_per_post: 15
    refresh_max_threads: 20    # engagement re-poll of suggested-opportunity root posts per scrape run; 0 disables (B4, 2026-07-07)
    keyword_max_posts: 10      # old.reddit search results per watched keyword; 0 disables (2026-07-08)
    sort_types_hourly: [new, hot, rising]   # every hourly scrape; scraper de-dups across sorts
    sort_types_daily_extra: [top]           # 1×/day — old.reddit /top = past 24h (verified 2026-07-05)
    budget:
      max_items_per_run: 2000
  youtube:
    enabled: true
    max_queries_per_run: 20
    max_videos_per_query: 5
    max_comments_per_video: 20
    comment_quality:
      min_chars: 8
      deny_terms: [telegram, whatsapp group, jackpot, sure shot, guaranteed profit]
    queries:
      retail:
        - Nubra trading app
        - Nubra option chain
        - Nubra trading review
        - option chain analysis India
        - Nifty option chain analysis
        - BankNifty option chain analysis
        - option chain OI PCR max pain
        - OI buildup option chain India
        - option chain filters India
        - option chain bid ask spread
        - option buyer strategy India
        - option seller strategy India
        - options strategy builder India
        - payoff graph options India
        - option strategy payoff graph India
        - scalping trading app India
        - one click trading app India
        - trading app watchlist India
        - stock SIP trading app India
        - best trading app for options India
      api_algo:
        - Nubra API
        - Nubra websocket
        - trading API India
        - broker API India
        - algo trading API India
        - market data websocket India
        - order placement API trading
        - automated trading India
        - backtesting trading strategy India
        - paper trading API India
        - trading API historical data India
      competitors:
        - Zerodha Kite option chain
        - Dhan option chain
        - Dhan options strategy builder
        - Upstox trading app review
        - Angel One SmartAPI
        - Sensibull option chain
        - Opstra strategy builder
        - FYERS trading app review
  github:
    enabled: true
    max_queries_per_run: 20
    max_items_per_query: 20
    relevance:
      min_score: 2
      allow_terms:
        - trading api
        - broker api
        - market data
        - websocket
        - order placement
        - historical data
        - algo trading
        - automated trading
        - paper trading
        - kite connect
        - smartapi
        - upstox api
        - dhanhq
        - fyers api
        - nse
        - bse
        - zerodha
        - dhan
        - upstox
        - angel one
        - fyers
        - nubra
      deny_terms:
        - casino
        - betting
        - porn
        - sex
        - crypto airdrop
        - nft
        - spam
        - wealth builder empire
    queries:
      - '"trading API India"'
      - '"broker API India"'
      - '"algo trading" "NSE"'
      - '"market data websocket" trading'
      - '"order placement API" trading'
      - '"historical data API" trading'
      - '"paper trading" "broker API"'
      - '"backtesting" "broker API"'
      - '"Zerodha Kite Connect"'
      - '"DhanHQ API"'
      - '"Upstox API"'
      - '"Angel One SmartAPI"'
      - '"FYERS API"'
      - '"Nubra API"'
      - '"Nubra websocket"'
  broker_communities:
    enabled: true
    max_topics_per_source: 20
    max_replies_per_topic: 10
    sources:
      - name: Zerodha TradingQnA
        broker: zerodha
        platform: discourse
        base_url: https://tradingqna.com
      - name: Upstox Community
        broker: upstox
        platform: discourse
        base_url: https://community.upstox.com
      - name: Angel One SmartAPI Forum
        broker: angel_one
        platform: nodebb
        base_url: https://smartapi.angelone.in/smartapi/forum
      - name: FYERS Community
        broker: fyers
        platform: sitemap_html
        sitemap_url: https://community.fyers.in/sitemap.xml
      - name: Dhan Community
        broker: dhan
        platform: sitemap_html
        sitemap_url: https://madefortrade.in/sitemap.xml
  app_reviews:
    enabled: true
    max_reviews_per_app: 100
    country: in
    apps:
      # Fill app identifiers when available. Apple uses numeric app_id; Google
      # Play uses package name. Missing identifiers are skipped safely.
      - name: Nubra
        broker: nubra
        apple_id:
        google_package:
      - name: Zerodha Kite
        broker: zerodha
        apple_id:
        google_package: com.zerodha.kite3
      - name: Dhan
        broker: dhan
        apple_id:
        google_package: com.dhan.live
      - name: Groww
        broker: groww
        apple_id:
        google_package: com.nextbillion.groww
      - name: Upstox
        broker: upstox
        apple_id:
        google_package: in.upstox.app
      - name: Angel One
        broker: angel_one
        apple_id:
        google_package: com.msf.angelmobile
      - name: FYERS
        broker: fyers
        apple_id:
        google_package:

recommend:
  thresholds: {headsup: 60, secondary: 40}   # calibrated on real data 2026-07-04; re-tune in shadow run
  max_drafted: 10
  action_min_interactions: 10   # top actions need real engagement (likes+replies+shares)
  weights:
    freshness_velocity: 0.25
    relevance: 0.30
    reach: 0.15
    opportunity_type: 0.15
    author_quality: 0.15
  recurrence_boost_per_hit: 0.05   # × headsup_count, capped
  recurrence_boost_cap: 0.15

delivery:
  headsup_on_empty: ops_summary    # ops_summary | skip
  nubra_watch_mention: ""          # empty = plain post (v1); set to e.g. "@community-support" later
  # channels are config-gated: missing creds -> channel skipped, archive always written
  overview: hourly                 # overview Slack message: daily | hourly | off (hourly per user 2026-07-08)
  dashboard_url: http://localhost:3000          # linked at the bottom of the overview message (set to the prod URL on deploy)
  slack_webhook_env: SLACK_WEBHOOK_URL          # .env key holding the incoming-webhook URL
  gmail_sender_env: GMAIL_SENDER                # .env key: from-address
  gmail_app_password_env: GMAIL_APP_PASSWORD    # .env key: app password
  email_recipients: []                          # e.g. [team@nubra.in]

roundup:
  daily_window_days: 7            # prod: 1 (the day); wider locally — test data spans days
  trending_min_items: 3              # a "trend" needs ≥N items — 1 person ≠ a trend
  trending_exclude_topics:           # covered in their own sections, not "trending"
    - broker_reliability
    - brokerage_charges
  features_min_mentions: 2           # feature requests need ≥N mentions (issues can be 1)

enrich:
  batch_sla_minutes: 25            # Batch API SLA; breach -> cancel + sync fallback (cost plan §2.1)
  poll_seconds: 20

content:
  # controlled taxonomy — the LLM picks family+platform from these, treatment is free
  format_families: [video_short, video_long, image_post, carousel, text_post, thread, poll]
  platforms: [instagram_reels, youtube_shorts, x_thread, x_post, linkedin_post, instagram_post]

aggregate:
  feature_sim_threshold: 0.86      # centroid match τ. NOTE: e5-small compresses cosines
                                   # (distinct asks ≈0.78–0.85, same ask ≥0.86 — measured on real
                                   # data 2026-07-05); LLD's 0.80 assumed a wider-range model
